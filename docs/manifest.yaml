# ============================================================
# サービス一覧

services:
  - name: DatabaseHelper
    file: lib/services/database_helper.dart
    description: データベース接続管理・初期化・マイグレーション
    methods:
      - get database
      - createFreshDatabase(String dbPath)
      - closeAndReset()
      - getDatabasePath()
    tables: [activity_logs, hash_chain, electronic_bookkeeping, sync_log, pdf_output_history, email_send_history]

  - name: HistoryRepository
    file: lib/services/history_repository.dart
    description: PDF出力・メール送信履歴の記録と取得
    methods:
      - recordPdfOutput(String documentType, String documentId, String documentNumber, String? customerName, String? filePath, String contentHash)
      - recordEmailSend(String? documentType, String? documentId, String? documentNumber, String recipientEmail, String? recipientName, String subject, String status)
      - getPdfOutputHistory(String? documentType, String? documentId, int limit)
      - getEmailSendHistory(String? documentType, String? documentId, int limit)
    tables: [pdf_output_history, email_send_history]
    used_by: [com.h1.plugin.documents]

  - name: InvoiceRepository
    file: lib/services/invoice_repository.dart
    description: 伝票のCRUD・入金管理・月次売上集計
    methods:
      - saveInvoice(Invoice invoice)
      - updateInvoice(Invoice invoice)
      - getAllInvoices(List<Customer> customers, DocumentType? documentTypeFilter, bool excludeCanceled)
      - getInvoiceById(String id, List<Customer> customers)
      - deleteInvoice(String id)
      - searchInvoices(List<Customer> customers, String? query, DocumentType? documentTypeFilter)
      - getInvoiceCountByCustomer(String customerId)
      - addReceipt(Receipt receipt)
      - updatePaymentStatus(String invoiceId)
      - getMonthlySales(int year)
      - getYearlyTotal(int year)
      - getTotalUnpaidAmount()
      - getUnpaidAmountByCustomer()
      - hasRedInvoice(String sourceDocumentId)
      - verifyAllLocked()
      - isYoungestIssuedInvoice(String invoiceId)
      - revertFormalIssue(String invoiceId)
      - getReceiptBySourceDocumentId(String sourceId)
      - cleanupOrphanedPdfs()
    tables: [invoices, invoice_items, receipts, customers, products, sync_log]

  - name: CustomerRepository
    file: lib/services/customer_repository.dart
    description: 顧客マスターのCRUD・重複チェック・GPS履歴管理
    methods:
      - getAllCustomers(bool includeHidden)
      - ensureCustomerColumns()
      - getCustomerHistory(String customerId)
      - checkDuplicate(String? tel, String? email, String? name, String? excludeId)
      - checkDuplicateTxn(DatabaseExecutor txn, String? tel, String? email, String? name, String? excludeId)
      - saveCustomer(Customer customer, bool force)
      - deleteCustomer(String id)
      - addGpsHistory(String customerId, double latitude, double longitude)
      - getGpsHistory(String customerId)
      - searchCustomers(String query, bool includeHidden)
      - updateContact(String customerId, String? email, String? tel, String? address)
      - getActiveContact(String customerId)
      - getById(String id)
      - cleanupDuplicateVersions()
      - setHidden(String id, bool hidden)
      - updateKanaOnly(String customerId, String kana)
    tables: [customers, customer_contacts, customer_gps_history, master_hidden]

  - name: ProductRepository
    file: lib/services/product_repository.dart
    description: 商品マスターのCRUD・バリエーション・顧客別価格・オプション管理
    methods:
      - getProduct(String id)
      - getAllProducts(bool includeHidden)
      - fetchByCategory(String categoryId, String query)
      - searchProducts(String query, bool includeHidden)
      - getProductByBarcode(String barcode)
      - saveProduct(Product product)
      - deleteProduct(String id)
      - setHiddenProduct(String id, bool hidden)
      - setHidden(String id, bool hidden)
      - updateStockQuantities(Map<String, int> adjustments)
      - cleanupDuplicateVersions()
      - getVariants(String parentId)
      - getCustomerPrices(String productId)
      - setCustomerPrice(CustomerProductPrice price)
      - deleteCustomerPrice(String customerId, String productId)
      - resolveUnitPrice(String productId, String? customerId)
      - getOptionGroups(String productId)
      - getOptionValues(String groupId)
      - setVariantOptions(String variantId, List<String> optionValueIds)
      - saveOptionGroup(ProductOptionGroup group)
      - saveOptionValue(ProductOptionValue value)
      - deleteOptionGroup(String id)
      - deleteOptionValue(String id)
      - generateVariants(String productId)
      - deleteVariants(String productId)
      - getVariantOptionValues(String variantId)
    tables: [products, master_hidden, customer_product_prices, product_option_groups, product_option_values, product_variant_options]

  - name: ProductCategoryRepository
    file: lib/services/product_category_repository.dart
    description: 商品カテゴリのツリー構造CRUD
    methods:
      - getAll()
      - getRoots()
      - getChildren(String parentId)
      - getPath(String id)
      - getTree()
      - save(ProductCategory category)
      - delete(String id)
      - moveNode(String id, String? newParentId)
      - getProductCount(String categoryId)
      - getAllCategories(bool includeInactive)
      - getOrCreateCategoryId(String name)
      - getAllProductCounts()
    tables: [product_categories, products]

  - name: ActivityLogRepository
    file: lib/services/activity_log_repository.dart
    description: 操作ログの記録と取得
    methods:
      - log(ActivityLog log)
      - logAction(String action, String targetType, String? targetId, String? details, String? screenId)
      - getAllLogs(int limit)
    tables: [activity_logs]

  - name: CompanyRepository
    file: lib/services/company_repository.dart
    description: 自社情報のDB保存・取得
    methods:
      - getCompanyInfo()
      - saveCompanyInfo(CompanyInfo info)
    tables: [company_info]

  - name: CompanyService
    file: lib/services/company_service.dart
    description: 法人（会社）の作成・切替・DBパス管理
    methods:
      - getCompanyDirectory()
      - getCompanyList()
      - getCurrentCompany()
      - setCurrentCompany(String name)
      - getCurrentDbPath()
      - companyExists(String name)
      - createCompany(String name)
      - deleteCompany(String name)
      - switchCompany(String name)
      - getDefaultCompany()
    tables: []

  - name: CompanyProfileService
    file: lib/services/company_profile_service.dart
    description: 自社情報プロファイルの取得・保存
    methods:
      - getProfile()
      - saveProfile(Map<String, dynamic> profile)
    tables: [company_info]

  - name: EditLogRepository
    file: lib/services/edit_log_repository.dart
    description: 伝票編集履歴の記録と取得（14日保持）
    methods:
      - addLog(String invoiceId, String message)
      - getLogs(String invoiceId)
    tables: [edit_logs]

  - name: ProjectRepository
    file: lib/services/project_repository.dart
    description: 案件（プロジェクト）のCRUD・文書紐付け・ステージ管理
    methods:
      - getAll()
      - updateOrder(String id, int order)
      - getById(String id)
      - getByCustomer(String customerId)
      - save(Project project)
      - createProject(String name, String customerId, String customerName, String? type, int? contractMonths)
      - delete(String id)
      - linkDocument(String projectId, String documentType, String documentId)
      - unlinkDocument(String documentId)
      - updateStage(String projectId, String stage)
      - getLinkedDocuments(String projectId)
    tables: [projects, documents]

  - name: AppSettingsRepository
    file: lib/services/app_settings_repository.dart
    description: アプリ設定のSharedPreferences管理
    methods:
      - init()
      - get(String key)
      - set(String key, String value)
      - getInt(String key)
      - setInt(String key, int value)
      - getBool(String key)
      - setBool(String key, bool value)
      - getSummaryTheme()
      - setSummaryTheme(String value)
      - getHomeMode()
      - watchHomeMode()
      - getShowHistoryInvoiceNumber()
      - setShowHistoryInvoiceNumber(bool value)
    tables: []

  - name: HistoryDbService
    file: lib/services/history_db_service.dart
    description: 履歴DB管理・変更ログ記録・ドキュメント復元
    methods:
      - get database
      - initialize(Database mainDb)
      - verifyManagementId(Database mainDb)
      - recordChange(String tableName, String rowId, String action, Map<String, dynamic> row)
      - getLatestState(String tableName)
      - repairDocumentsTable(Database mainDb)
      - purgeOldEntries(int days)
      - closeAndReset()
    tables: [change_log, meta, db_meta, documents, document_items]

  - name: DbSnapshotService
    file: lib/services/db_snapshot_service.dart
    description: DBスナップショットの作成・一覧・復元
    methods:
      - snapshot()
      - list()
      - restore(int index)
      - restoreLatest()
    tables: []

  - name: SyncService
    file: lib/services/sync_service.dart
    description: Gmail経由のグループ同期（プッシュ・プル・GC）
    methods:
      - getDeviceId()
