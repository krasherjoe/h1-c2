# docs/manifest.yaml
# h-1-core プラグイン・テーブル・サービス マニフェスト
# AI 第一主義。機械可読かつ人間編集可能。
# 変更時は test/docs/manifest_yaml_test.dart がバリデーションする

version: 1.0.0
last_updated: 2026-06-18

# ============================================================
# コアテーブル

core_tables:
  activity_logs:
    description: 操作ログ
    columns:
      - name: id
        type: TEXT PK
      - name: action
        type: TEXT NOT NULL
      - name: target_type
        type: TEXT NOT NULL
      - name: target_id
        type: TEXT
      - name: details
        type: TEXT
      - name: screen_id
        type: TEXT
      - name: timestamp
        type: TEXT NOT NULL
    indexes:
      - idx_activity_logs_target ON activity_logs(target_type, target_id)
      - idx_activity_logs_timestamp ON activity_logs(timestamp)
    used_by: [com.h1.core]

  hash_chain:
    description: ハッシュチェーン（PDF改ざん検証用）
    columns:
      - name: id
        type: TEXT PK
      - name: document_type
        type: TEXT NOT NULL
      - name: document_id
        type: TEXT NOT NULL
      - name: content_hash
        type: TEXT NOT NULL
      - name: previous_hash
        type: TEXT
      - name: created_at
        type: TEXT NOT NULL
      - name: version
        type: INTEGER NOT NULL DEFAULT 1
    indexes:
      - idx_hash_chain_document ON hash_chain(document_type, document_id)
    used_by: [com.h1.plugin.audit, com.h1.plugin.documents]

  electronic_bookkeeping:
    description: 電帳法対応（PDF生成JSON + Hash Chain）
    columns:
      - name: id
        type: TEXT PK
      - name: document_type
        type: TEXT NOT NULL
      - name: document_id
        type: TEXT NOT NULL
      - name: pdf_json
        type: TEXT NOT NULL
      - name: content_hash
        type: TEXT NOT NULL
      - name: previous_hash
        type: TEXT
      - name: version
        type: INTEGER NOT NULL DEFAULT 1
      - name: created_at
        type: TEXT NOT NULL
    indexes:
      - idx_eb_document ON electronic_bookkeeping(document_type, document_id)
    used_by: [com.h1.plugin.audit, com.h1.plugin.documents]

  sync_log:
    description: 同期ログ
    columns:
      - name: id
        type: INTEGER PK AUTOINCREMENT
      - name: entity_type
        type: TEXT NOT NULL
      - name: entity_id
        type: TEXT NOT NULL
      - name: action
        type: TEXT NOT NULL
      - name: data
        type: TEXT NOT NULL
      - name: device_id
        type: TEXT NOT NULL
      - name: parent_id
        type: TEXT
      - name: synced_at
        type: TEXT
      - name: created_at
        type: TEXT NOT NULL
    indexes:
      - idx_sync_log_entity ON sync_log(entity_type, entity_id)
      - idx_sync_log_unsent ON sync_log(synced_at) WHERE synced_at IS NULL
    used_by: [com.h1.plugin.sync]

  pdf_output_history:
    description: PDF出力履歴
    columns:
      - name: id
        type: TEXT PK
      - name: document_type
        type: TEXT NOT NULL
      - name: document_id
        type: TEXT NOT NULL
      - name: document_number
        type: TEXT NOT NULL
      - name: customer_name
        type: TEXT
      - name: file_path
        type: TEXT
      - name: content_hash
        type: TEXT NOT NULL
      - name: output_at
        type: TEXT NOT NULL
    indexes:
      - idx_pdf_history_document ON pdf_output_history(document_type, document_id)
      - idx_pdf_history_output_at ON pdf_output_history(output_at)
    used_by: [com.h1.plugin.documents]

  email_send_history:
    description: メール送信履歴
    columns:
      - name: id
        type: TEXT PK
      - name: document_type
        type: TEXT
      - name: document_id
        type: TEXT
      - name: document_number
        type: TEXT
      - name: recipient_email
        type: TEXT NOT NULL
      - name: recipient_name
        type: TEXT
      - name: subject
        type: TEXT NOT NULL
      - name: status
        type: TEXT NOT NULL DEFAULT 'sent'
      - name: sent_at
        type: TEXT NOT NULL
    indexes:
      - idx_email_history_document ON email_send_history(document_type, document_id)
      - idx_email_history_sent_at ON email_send_history(sent_at)
    used_by: [com.h1.plugin.documents]

