name: h_1_core
description: "販売アシスト1号 コア版 - 請求書・領収証発行、顧客・商品マスター"
publish_to: 'none'
version: 1.2.33+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path_provider: ^2.1.5
  path: ^1.9.0
  pdf: ^3.11.3
  printing: ^5.14.2
  intl: ^0.20.2
  crypto: ^3.0.7
  uuid: ^4.5.1
  shared_preferences: ^2.2.2
  http: ^1.6.0
  url_launcher: ^6.3.2
  flutter_email_sender: ^8.0.0
  google_sign_in: ^6.1.0
  googleapis: ^12.0.0
  camera: ^0.12.0+1
  image_picker: ^1.1.2
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  sqflite_common_ffi: ^2.3.2
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - fonts/ipaexg.ttf

  fonts:
    - family: IPAexGothic
      fonts:
        - asset: fonts/ipaexg.ttf
